<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AP 题库</title>
  <meta name="robots" content="noindex">
  <script>var m=location.pathname.match(/^\/(AP-Learning-Web-0\d)(?:\/|$)/);window._b='/'+(m?m[1]:'AP-Learning-Web');</script>
  <script src="assets/site-base.js"></script>
  <script>document.write('<link rel="stylesheet" href="'+window.sitePath('/ap/catalog.css')+'">');</script>
</head>
<body>
  <header class="site-header">
    <div class="shell nav">
      <a class="brand" id="brand-link" href="/">
        <span class="brand-mark">AP</span>
        <span class="brand-copy">
          <span class="brand-title">MokaoAI Practice</span>
          <span class="brand-subtitle">AP 题库</span>
        </span>
      </a>
      <nav class="nav-links" aria-label="Primary" id="primary-nav"></nav>
    </div>
  </header>

  <main class="shell page-shell">
    <section class="page-hero">
      <span class="eyebrow">Local Catalog</span>
      <div class="page-heading">
        <div>
          <h1>AP 题库目录</h1>
          <p>按科目浏览本地可用试卷，支持搜索、年份筛选、卷型筛选，以及本地进度提示。</p>
        </div>
        <div class="hero-actions" id="hero-actions"></div>
      </div>
    </section>

    <section class="filters-card">
      <div class="search-row">
        <label class="search-box" for="search-input">
          <span>搜索</span>
          <input id="search-input" type="search" placeholder="搜索科目、年份或卷名">
        </label>
      </div>
      <div class="filter-group">
        <div class="filter-label">年份</div>
        <div class="tag-row" id="year-tags"></div>
      </div>
      <div class="filter-group">
        <div class="filter-label">卷型</div>
        <div class="tag-row" id="type-tags"></div>
      </div>
    </section>

    <section class="catalog-meta" id="catalog-meta"></section>
    <section class="catalog-root" id="catalog-root">
      <div class="loading-card">正在加载本地题库索引…</div>
    </section>
  </main>

  <script>document.write('<scr'+'ipt type="module" src="'+window.sitePath('/ap/catalog.js')+'"><\/scr'+'ipt>');</script>
  <script>
    // Fix all absolute paths after site-base loads
    var _fixPaths = function() {
      var brand = document.getElementById('brand-link');
      if (brand) brand.href = window.sitePath('/');
      document.querySelectorAll('[href^="/"]').forEach(function(el) {
        el.setAttribute('href', window.sitePath(el.getAttribute('href')));
      });
    };
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', _fixPaths);
    } else { _fixPaths(); }
  </script>
</body>
</html>
