<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AP Practice Test</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="mock.css">
</head>
<body>
  <div id="app" class="app-shell">
    <div class="boot-screen">
      <div class="boot-card">
        <div class="micro-kicker">AP Practice Test</div>
        <h1>Loading your test</h1>
        <p>Restoring your local progress and preparing the official exam shell.</p>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="confirm-shell" id="confirm-shell" style="display:none; position:fixed; inset:0; z-index:999; background:rgba(0,0,0,0.45); align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:16px; padding:1.75rem; max-width:420px; width:90%; box-shadow:0 8px 32px rgba(0,0,0,0.2); display:grid; gap:1rem;">
      <h3 id="confirm-title" style="margin:0; font-size:1.1rem;"></h3>
      <p id="confirm-body" style="margin:0; font-size:0.88rem; color:#697a8f; line-height:1.6;"></p>
      <div style="display:flex; gap:0.75rem; justify-content:flex-end;">
        <button class="secondary-button" id="confirm-cancel" style="min-height:38px; padding:0 18px; border-radius:6px; border:1px solid #d7e1eb; background:#fff; color:#152232; font-weight:600; cursor:pointer;">Cancel</button>
        <button class="primary-footer" id="confirm-ok" style="min-height:38px; padding:0 18px; border-radius:6px; border:1px solid #ef4444; background:#ef4444; color:#fff; font-weight:600; cursor:pointer;">Confirm</button>
      </div>
    </div>
  </div>
  <script>window.KATEX_BASE = 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/';</script>
  <script src="../assets/site-base.js"></script>
  <script type="module" src="mock.js?v=5"></script>
</body>
</html>
