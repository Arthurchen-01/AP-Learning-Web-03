<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>套题模考 - AP Learning</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --primary: #22c55e;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
    }

    .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); text-decoration: none; }
    nav { display: flex; gap: 1.5rem; }
    nav a { color: var(--text-muted); text-decoration: none; padding: 0.5rem 1rem; border-radius: 6px; transition: all 0.2s; }
    nav a:hover, nav a.active { color: var(--text); background: var(--border); }

    .container { max-width: 900px; margin: 0 auto; padding: 2rem; }

    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .subtitle { color: var(--text-muted); margin-bottom: 2rem; }

    .filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .filter-select {
      padding: 0.5rem 1rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
    }

    .exam-list { display: flex; flex-direction: column; gap: 1rem; }

    .exam-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }
    .exam-card:hover { border-color: var(--primary); transform: translateX(4px); }

    .exam-info h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }
    .exam-meta { display: flex; gap: 1.5rem; color: var(--text-muted); font-size: 0.85rem; }
    .exam-meta span { display: flex; align-items: center; gap: 0.3rem; }

    .badge {
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-mcq { background: #22c55e20; color: var(--primary); }
    .badge-frq { background: #f59e0b20; color: var(--warning); }
    .badge-calc { background: #22c55e20; color: var(--success); }

    .btn {
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: var(--border); color: var(--text); }

    .progress-tag {
      font-size: 0.8rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      background: var(--success);
      color: white;
    }
    .progress-tag.not-started { background: var(--text-muted); }
  </style>
</head>
<body>
  <header>
    <a href="../" class="logo">AP Learning</a>
    <nav>
      <a href="../">首页</a>
      <a href="./" class="active">套题模考</a>
      <a href="../dashboard/">学习面板</a>
    </nav>
  </header>

  <div class="container">
    <h1>套题模考</h1>
    <p class="subtitle">选择试卷，开始计时练习</p>

    <div class="filters">
      <select class="filter-select" id="subject-filter">
        <option value="">全部科目</option>
        <option value="calculus_bc">AP Calculus BC</option>
        <option value="calculus_ab">AP Calculus AB</option>
        <option value="statistics">AP Statistics</option>
        <option value="microeconomics">AP Microeconomics</option>
      </select>
      <select class="filter-select" id="year-filter">
        <option value="">全部年份</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
        <option value="2022">2022</option>
        <option value="2021">2021</option>
        <option value="2020">2020</option>
        <option value="2019">2019</option>
        <option value="2018">2018</option>
      </select>
    </div>

    <div class="exam-list" id="exam-list">
      <!-- 动态加载 -->
      <div style="color: var(--text-muted); text-align: center; padding: 2rem;">
        加载中...
      </div>
    </div>
  </div>

  <script type="module">
    import { loadExamIndex, loadSession } from '../js/data-service.js';

    const subjectNames = {
      'calculus_bc': '微积分BC',
      'calculus_ab': '微积分AB',
      'statistics': '统计学',
      'microeconomics': '微观经济',
      'macroeconomics': '宏观经济'
    };

    async function renderExamList() {
      const exams = await loadExamIndex();
      const list = document.getElementById('exam-list');

      if (!exams || exams.length === 0) {
        list.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 2rem;">暂无试卷</p>';
        return;
      }

      list.innerHTML = exams.map(exam => {
        const session = loadSession(exam.exam_id);
        const progress = session ? getProgress(session) : null;

        return `
          <div class="exam-card" data-subject="${exam.subject}" data-year="${exam.year}">
            <div class="exam-info">
              <h3>${exam.exam_title}</h3>
              <div class="exam-meta">
                <span>📚 ${subjectNames[exam.subject] || exam.subject}</span>
                <span>📝 ${exam.total_questions}题</span>
                <span>⏱️ ${getTotalTime(exam)}</span>
                ${progress ? `<span class="progress-tag">${progress.answered}/${progress.total}</span>` : '<span class="progress-tag not-started">未开始</span>'}
              </div>
            </div>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
              ${exam.sections.map(s =>
                `<span class="badge ${s.calculator_allowed ? 'badge-calc' : 'badge-mcq'}">${s.part_label}</span>`
              ).join('')}
              <a href="paper.html?exam=${exam.exam_id}" class="btn btn-primary">
                ${progress && progress.answered > 0 ? '继续' : '开始'}
              </a>
            </div>
          </div>
        `;
      }).join('');
    }

    function getTotalTime(exam) {
      const totalMins = exam.sections.reduce((sum, s) => sum + (s.time_limit_minutes || 60), 0);
      const hours = Math.floor(totalMins / 60);
      const mins = totalMins % 60;
      return hours > 0 ? `${hours}小时${mins > 0 ? mins + '分钟' : ''}` : `${mins}分钟`;
    }

    function getProgress(session) {
      if (!session || !session.sections) return null;
      let answered = 0, total = 0;
      session.sections.forEach(s => {
        s.answers.forEach(a => {
          if (a !== null) answered++;
          total++;
        });
      });
      return { answered, total };
    }

    // 过滤器
    document.getElementById('subject-filter').addEventListener('change', filterExams);
    document.getElementById('year-filter').addEventListener('change', filterExams);

    function filterExams() {
      const subject = document.getElementById('subject-filter').value;
      const year = document.getElementById('year-filter').value;
      document.querySelectorAll('.exam-card').forEach(card => {
        const matchSubject = !subject || card.dataset.subject === subject;
        const matchYear = !year || card.dataset.year === year;
        card.style.display = matchSubject && matchYear ? 'flex' : 'none';
      });
    }

    renderExamList();
  </script>
</body>
</html>
