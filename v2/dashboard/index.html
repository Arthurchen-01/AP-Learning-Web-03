<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习面板 - AP Learning</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --primary: #22c55e;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
    }

    .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); text-decoration: none; }
    nav { display: flex; gap: 1.5rem; }
    nav a { color: var(--text-muted); text-decoration: none; padding: 0.5rem 1rem; border-radius: 6px; transition: all 0.2s; }
    nav a:hover, nav a.active { color: var(--text); background: var(--border); }

    .header-user {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .user-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
    }
    .user-subject-tag {
      font-size: 0.75rem;
      padding: 0.2rem 0.65rem;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .subtitle { color: var(--text-muted); margin-bottom: 2rem; }

    /* Subject Selector */
    .subject-selector,
    .subject-cards {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .subject-cards {
      scroll-margin-top: 1.5rem;
    }
    .subject-btn {
      padding: 0.5rem 1.25rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      font-size: 0.9rem;
    }
    .subject-btn:hover { border-color: var(--primary); }
    .subject-btn.active { background: var(--primary); border-color: var(--primary); }

    /* ── Topics Mastery UI ── */
    .topics-section {
      margin-top: 1.5rem;
    }
    .topic-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .topic-row:last-child { border-bottom: none; }
    .topic-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .topic-name { font-size: 0.9rem; font-weight: 500; }
    .topic-bar-wrap {
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
      width: 180px;
    }
    .topic-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .topic-bar-fill.high { background: var(--success); }
    .topic-bar-fill.mid { background: var(--warning); }
    .topic-bar-fill.low { background: var(--danger); }
    .topic-pct { font-size: 0.85rem; color: var(--text-muted); min-width: 36px; text-align: right; }
    .topic-actions { display: flex; gap: 0.4rem; }
    .ghost-btn {
      padding: 0.25rem 0.7rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .ghost-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* Countdown with date */
    .countdown-date {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-left: 0.5rem;
    }

    /* Stats Overview */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1.25rem;
      border: 1px solid var(--border);
    }
    .stat-card .value { font-size: 2rem; font-weight: 700; }
    .stat-card .label { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.25rem; }
    .stat-card .value.green { color: var(--success); }
    .stat-card .value.yellow { color: var(--warning); }
    .stat-card .value.red { color: var(--danger); }

    /* Main Grid */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .panel {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid var(--border);
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .panel-title { font-size: 1.1rem; font-weight: 600; }

    /* Unit Progress */
    .unit-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .unit-item {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .unit-name { width: 120px; font-size: 0.9rem; }
    .unit-bar {
      flex: 1;
      height: 10px;
      background: var(--bg);
      border-radius: 5px;
      overflow: hidden;
    }
    .unit-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.3s ease;
    }
    .unit-fill.high { background: var(--success); }
    .unit-fill.mid { background: var(--warning); }
    .unit-fill.low { background: var(--danger); }
    .unit-pct { width: 45px; text-align: right; font-size: 0.85rem; color: var(--text-muted); }

    /* Accuracy Table */
    .accuracy-table { width: 100%; border-collapse: collapse; }
    .accuracy-table th, .accuracy-table td {
      padding: 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .accuracy-table th { color: var(--text-muted); font-weight: 500; font-size: 0.85rem; }
    .accuracy-table td { font-size: 0.95rem; }

    /* Recent Activity */
    .activity-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .activity-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem;
      background: var(--bg);
      border-radius: 8px;
    }
    .activity-name { font-weight: 500; }
    .activity-meta { color: var(--text-muted); font-size: 0.8rem; }
    .activity-score { font-weight: 700; }
    .activity-score.good { color: var(--success); }
    .activity-score.ok { color: var(--warning); }
    .activity-score.bad { color: var(--danger); }

    /* Mastery Badges */
    .mastery-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .mastery-badge.crown { background: #fbbf2420; color: #fbbf24; }
    .mastery-badge.full { background: #22c55e20; color: var(--success); }
    .mastery-badge.good { background: #22c55e20; color: var(--primary); }
    .mastery-badge.low { background: #ef444420; color: var(--danger); }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
    }

    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .main-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <a href="../" class="logo">AP Learning</a>
    <nav>
      <a href="../">首页</a>
      <a href="../exam/">套题模考</a>
      <a href="./" class="active">学习面板</a>
    </nav>
    <div class="header-user">
      <span class="user-name">Student</span>
      <span class="user-subject-tag" id="user-subject-tag">微积分 BC</span>
    </div>
  </header>

  <div class="container">

    <h1>学习面板</h1>
    <p class="subtitle" id="subtitle">查看你的学习进度和薄弱环节</p>

    <!-- 学科概览卡片（点击平滑滚动到详情区） -->
    <div class="subject-cards" id="subject-cards">
      <button class="subject-btn active" data-subject="calculus_bc">微积分 BC</button>
      <button class="subject-btn" data-subject="calculus_ab">微积分 AB</button>
      <button class="subject-btn" data-subject="statistics">统计学</button>
      <button class="subject-btn" data-subject="microeconomics">微观经济</button>
      <button class="subject-btn" data-subject="macroeconomics">宏观经济</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="value" id="stat-exams">0</div>
        <div class="label">已完成试卷</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-questions">0</div>
        <div class="label">已答题数</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-accuracy">0%</div>
        <div class="label">平均正确率</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-mastery">0%</div>
        <div class="label">整体掌握度</div>
      </div>
    </div>

    <div class="main-grid">
      <div class="panel" id="topics-panel">
        <div class="panel-header">
          <span class="panel-title">Topics 掌握度</span>
          <span id="topics-count" style="font-size:0.8rem;color:var(--text-muted)"></span>
        </div>
        <div class="topics-section" id="topics-list">
          <div class="empty-state">选择科目查看 Topics</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">最近练习</span>
        </div>
        <div class="activity-list" id="activity-list">
          <div class="empty-state">暂无练习记录</div>
        </div>
      </div>

      <div class="panel" style="grid-column: span 2;">
        <div class="panel-header">
          <span class="panel-title">薄弱知识点</span>
        </div>
        <div id="weak-points">
          <div class="empty-state">完成更多练习后，这里会显示你需要加强的知识点</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { loadProgress } from '../js/data-service.js';

    // 科目配置
    const subjects = {
      calculus_bc: {
        name: 'AP Calculus BC',
        display: '微积分 BC',
        units: [
          'Limits and Continuity',
          'Differentiation: Definition & Basic Rules',
          'Differentiation: Composite, Implicit, Inverse Functions',
          'Contextual Applications of Differentiation',
          'Analytical Applications of Differentiation',
          'Integration and Accumulation of Change',
          'Differential Equations',
          'Applications of Integration',
          'Parametric Equations, Polar Coordinates, Vector Functions',
          'Infinite Sequences and Series'
        ]
      },
      calculus_ab: {
        name: 'AP Calculus AB',
        display: '微积分 AB',
        units: [
          'Limits and Continuity',
          'Differentiation: Definition & Basic Rules',
          'Differentiation: Composite, Implicit, Inverse Functions',
          'Contextual Applications of Differentiation',
          'Analytical Applications of Differentiation',
          'Integration and Accumulation of Change',
          'Differential Equations',
          'Applications of Integration'
        ]
      },
      statistics: {
        name: 'AP Statistics',
        display: '统计学',
        units: ['Exploring One-Variable Data', 'Exploring Two-Variable Data', 'Collecting Data', 'Probability', 'Sampling Distributions', 'Estimation', 'Hypothesis Testing']
      },
      microeconomics: {
        name: 'AP Microeconomics',
        display: '微观经济',
        units: ['Supply and Demand', 'Production and Costs', 'Perfect Competition', 'Imperfect Competition', 'Factor Markets', 'Market Failure']
      },
      macroeconomics: {
        name: 'AP Macroeconomics',
        display: '宏观经济',
        units: ['Basic Economic Concepts', 'Measurement of Economic Performance', 'National Income and Price Determination', 'Financial Sector', 'Stabilization Policies', 'Economic Growth']
      }
    };

    let currentSubject = 'calculus_bc';

    // 初始化
    function init() {
      const progress = loadProgress();

      // 更新统计
      document.getElementById('stat-exams').textContent = progress.exams || 0;
      document.getElementById('stat-questions').textContent = progress.questions || 0;
      document.getElementById('stat-accuracy').textContent = (progress.accuracy || 0) + '%';

      // 计算整体掌握度
      const mastery = calculateMastery(progress);
      document.getElementById('stat-mastery').textContent = mastery + '%';

      // 渲染 Topics 列表
      renderTopics();

      // 渲染最近活动
      renderRecentActivity();

      // 科目选择（平滑滚动到 topics-panel）
      document.querySelectorAll('.subject-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.subject-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentSubject = btn.dataset.subject;
          // 更新 header 学科标签
          const tag = document.getElementById('user-subject-tag');
          if (tag) tag.textContent = subjects[currentSubject]?.display || currentSubject;
          renderTopics();
          // 平滑滚动到 Topics 区域
          document.getElementById('topics-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });
    }

    function calculateMastery(progress) {
      if (!progress.subjects || !progress.subjects[currentSubject]) {
        return 0;
      }
      const subject = progress.subjects[currentSubject];
      return subject.questions > 0 ? Math.round((subject.correct / subject.questions) * 100) : 0;
    }

    // AP 考试日期（每年5月中旬）
    function getExamDate(year) {
      // AP 考试通常在5月第二周结束，取5月15日
      return new Date(year, 4, 15); // month is 0-indexed
    }
    function getDaysLeft(targetDate) {
      const now = new Date();
      const diff = targetDate - now;
      return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
    }
    function formatDateShort(date) {
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return `${months[date.getMonth()]} ${date.getDate()}`;
    }

    function renderTopics() {
      const container = document.getElementById('topics-list');
      const countEl = document.getElementById('topics-count');
      const subject = subjects[currentSubject];

      // 模拟 Topics 数据（实际应从 progress 读取）
      const progress = loadProgress();
      const subjectProgress = progress.subjects?.[currentSubject] || {};
      const accuracy = subjectProgress.questions > 0
        ? Math.round((subjectProgress.correct / subjectProgress.questions) * 100)
        : 0;

      // 考试倒计时
      const examYear = new Date().getFullYear();
      const examDate = getExamDate(examYear);
      const daysLeft = getDaysLeft(examDate);
      const dateStr = formatDateShort(examDate);
      const countdownHtml = daysLeft > 0
        ? `<span class="countdown-date">${daysLeft} Days left (${dateStr})</span>`
        : '';

      // 更新 subject button 显示倒计时
      document.querySelectorAll('.subject-btn').forEach(btn => {
        if (btn.dataset.subject === currentSubject) {
          // 在 btn 后加 countdown
          let cd = btn.querySelector('.countdown-date');
          if (!cd) {
            cd = document.createElement('span');
            cd.className = 'countdown-date';
            btn.style.position = 'relative';
            btn.appendChild(cd);
          }
          cd.textContent = ` · ${daysLeft}d (${dateStr})`;
        } else {
          const cd = btn.querySelector('.countdown-date');
          if (cd) cd.remove();
        }
      });

      // Topics 数据（模拟）
      const topicMasteries = subject.units.map((name, i) => {
        const mastery = i === 0 ? 88 : i === 1 ? 75 : i === 2 ? 62 : Math.max(15, Math.floor(Math.random() * 85));
        return { name, mastery };
      });

      if (countEl) countEl.textContent = `${topicMasteries.length} topics`;

      container.innerHTML = topicMasteries.map(topic => {
        const level = topic.mastery >= 70 ? 'high' : topic.mastery >= 40 ? 'mid' : 'low';
        const barColor = level === 'high' ? 'var(--success)' : level === 'mid' ? 'var(--warning)' : 'var(--danger)';
        return `
          <div class="topic-row">
            <div class="topic-left">
              <span class="topic-name">${topic.name}</span>
              <div class="topic-bar-wrap">
                <div class="topic-bar-fill ${level}" style="width:${topic.mastery}%; background:${barColor}"></div>
              </div>
            </div>
            <span class="topic-pct">${topic.mastery}%</span>
            <div class="topic-actions">
              <button class="ghost-btn">Practice</button>
              <button class="ghost-btn">Review</button>
            </div>
          </div>`;
      }).join('');
    }

    function renderRecentActivity() {
      const container = document.getElementById('activity-list');
      const sessions = getRecentSessions();

      if (sessions.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无练习记录</div>';
        return;
      }

      container.innerHTML = sessions.map(session => {
        const pct = session.accuracy;
        const level = pct >= 70 ? 'good' : pct >= 40 ? 'ok' : 'bad';
        const date = session.completedAt ? new Date(session.completedAt).toLocaleDateString('zh-CN') : '';
        return `
          <div class="activity-item">
            <div>
              <div class="activity-name">${session.name}</div>
              <div class="activity-meta">${date} · ${session.answered}/${session.total} 题</div>
            </div>
            <div class="activity-score ${level}">${pct}%</div>
          </div>
        `;
      }).join('');
    }

    function getRecentSessions() {
      // 从 localStorage 读取最近的做题记录
      try {
        return JSON.parse(localStorage.getItem('ap-learning-sessions') || '[]').slice(0, 5);
      } catch (e) {
        return [];
      }
    }

    init();
  </script>
</body>
</html>
